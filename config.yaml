data:
  data_dir: "data/raw"
  img_size: 224
  num_classes: 8
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

augmentation:
  use_haze: true
  use_color_jitter: true
  use_contrast: true
  use_clahe: true
  haze_beta_range: [0.5, 1.5]
  color_jitter_brightness: 0.3
  color_jitter_contrast: 0.3
  color_jitter_saturation: 0.3
  color_jitter_hue: 0.1

models:
  cswin:
    variant: "base"
    embed_dim: 96
    depths: [2, 4, 32, 2]
    split_sizes: [1, 2, 7, 7]
    num_heads: [2, 4, 8, 16]
    mlp_ratio: 4.0
    dropout: 0.1
    drop_path: 0.1
  
  resnet50:
    pretrained: true

training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 1e-4
  use_mixed_precision: true
  gradient_clip_norm: 1.0

evaluation:
  metrics: ["accuracy", "mAP", "precision", "recall", "f1"]

deployment:
  convert_onnx: true
  convert_tensorrt: true
  tensorrt_precision: "fp16"
  target_fps: 45

output:
  output_dir: "outputs"
  model_dir: "outputs/models"
  log_dir: "outputs/logs"
  onnx_dir: "outputs/onnx"
  tensorrt_dir: "outputs/tensorrt"
